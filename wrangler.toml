# ============================================================
# UniSkill Gateway - Cloudflare Workers Configuration
# ============================================================

name = "uniskill-gateway"
main = "src/index.ts"
compatibility_date = "2024-03-06"
compatibility_flags = ["nodejs_compat"]

# ── KV Storage Bindings ─────────────────────────────────────
[[kv_namespaces]]
binding = "UNISKILL_KV"
id = "9f388e510ffc426c8320f839ae769fe3"


# ---------------------------------------------------
# 🟢 全局变量 & 生产环境配置 (Production)
# ---------------------------------------------------
[vars]
SUPABASE_URL = "https://iwijeijjpnojtolvcxtp.supabase.co"
VERCEL_WEBHOOK_URL = "https://www.uniskill.ai/api/webhook/sync-credits"
WEB_DOMAIN = "https://uniskill.ai"
MAPBOX_API_KEY = "your_mapbox_api_key_here"

# Web3/M2M 商业化总闸门 (更专业的命名: 机器到机器支付)
ENABLE_M2M_PAYMENTS = "false" 
ENVIRONMENT = "production"
NEVERMINED_PLAN_ID = "" 


# ---------------------------------------------------
# 🟠 测试环境配置 (Staging)
# ---------------------------------------------------
[env.staging]
name = "uniskill-gateway-staging"

[[env.staging.kv_namespaces]]
binding = "UNISKILL_KV"
id = "9f388e510ffc426c8320f839ae769fe3"

[env.staging.vars]
# Inherited production-level vars needed for staging
SUPABASE_URL = "https://iwijeijjpnojtolvcxtp.supabase.co"
VERCEL_WEBHOOK_URL = "https://www.uniskill.ai/api/webhook/sync-credits"
WEB_DOMAIN = "https://uniskill.ai"
MAPBOX_API_KEY = "your_mapbox_api_key_here"

# 开启 M2M 机器支付逻辑测试
ENABLE_M2M_PAYMENTS = "true" 
ENVIRONMENT = "staging"
NEVERMINED_PLAN_ID = "did:nv:72454963757825695651137500032031971678181590824755941877945257628452503989205" 
TEST_WALLET_ADDRESS = "0xfA90a817E010BD2665C04A6D1d2Ba3fAcd30eFEB"

# ---------------------------------------------------
# 💻 本地开发环境配置
# ---------------------------------------------------
[dev]
port = 8787
