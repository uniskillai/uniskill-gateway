name: Mintlify Check

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"

jobs:
  check-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify
        run: npm install -g mintlify

      - name: Run Mintlify Validate
        run: |
          cd docs
          # 使用正确的 validate 命令替换之前的 check
          mintlify validate
